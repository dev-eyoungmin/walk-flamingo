<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wobbly Flamingo Icon</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
        }
        .icon-box {
            width: 512px;
            height: 512px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wobbly Flamingo Icon</h1>
        <p>Right-click the image below and select "Save Image As..."</p>
        
        <div class="icon-box">
           <img src="./app-icon-generated.svg" width="512" height="512" alt="App Icon">
        </div>
        
        <p>Save as: <code>assets/icon.png</code></p>
    </div>
</body>
</html>
