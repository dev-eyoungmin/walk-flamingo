<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1024" height="500" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="900" cy="80" r="50" fill="#FFD700" opacity="0.8"/>
  <circle cx="900" cy="80" r="70" fill="#FFD700" opacity="0.3"/>

  <!-- Hills (Back) -->
  <path d="M0 400 Q 200 300, 400 380 T 800 350 T 1024 400 V 500 H 0 Z" fill="#A2D149"/>

  <!-- Hills (Front) -->
  <path d="M0 500 Q 300 420, 500 480 T 1024 450 V 500 H 0 Z" fill="#6E9E3B"/>

  <!-- Character (Simplified Flamingo) -->
  <g transform="translate(150, 150) scale(0.8)">
      <!-- Legs -->
      <line x1="80" y1="200" x2="100" y2="350" stroke="#E86A6A" stroke-width="8" stroke-linecap="round"/>
      <line x1="120" y1="200" x2="100" y2="350" stroke="#E86A6A" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Body -->
      <ellipse cx="100" cy="180" rx="70" ry="55" fill="#FF7A9A"/>
      <path d="M40 160 Q 10 120, 30 140" stroke="#FF6585" stroke-width="5" fill="none"/> <!-- Tail -->
      
      <!-- Wing -->
      <path d="M80 170 Q 130 180, 90 210" fill="#E8658A"/>

      <!-- Neck & Head -->
      <path d="M140 150 Q 180 120, 160 80 Q 150 50, 180 40" stroke="#FF7A9A" stroke-width="18" fill="none" stroke-linecap="round"/>
      <circle cx="180" cy="40" r="22" fill="#FF7A9A"/>
      
      <!-- Beak -->
      <path d="M195 45 L 240 55 L 195 65 Z" fill="#FF8845"/>
      <path d="M225 52 L 240 55 L 230 62 Z" fill="#2A2A2A"/>

      <!-- Eye -->
      <circle cx="185" cy="35" r="5" fill="white"/>
      <circle cx="187" cy="35" r="2" fill="black"/>
  </g>

  <!-- Title Text -->
  <g transform="translate(450, 250)" filter="url(#shadow)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#FF7A9A" stroke="white" stroke-width="4">WOBBLY</text>
    <text x="50" y="90" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#FF7A9A" stroke="white" stroke-width="4">FLAMINGO</text>
  </g>

</svg>
