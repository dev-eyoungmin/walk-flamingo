<svg width="1242" height="2436" viewBox="0 0 1242 2436" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Soft Sky Blue Gradient -->
  <defs>
    <linearGradient id="splashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1242" height="2436" fill="url(#splashGrad)"/>

  <!-- Floating Clouds (Static for Splash) -->
  <g fill="white" opacity="0.5">
    <path d="M200 400 Q 260 400, 250 370 Q 220 340, 180 350 Q 140 330, 110 360 Q 100 400, 150 400 Z" />
    <path d="M1000 600 Q 1060 600, 1050 570 Q 1020 540, 980 550 Q 940 530, 910 560 Q 900 600, 950 600 Z" transform="scale(1.5)" />
  </g>

  <!-- Central Flamingo Logo -->
  <g transform="translate(621, 1100) scale(2.5)">
      <!-- Neck & Head -->
      <path d="M-20 20 C 20 -30, 0 -70, 30 -110" stroke="#FF7A9A" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="-110" r="25" fill="#FF7A9A"/>
      <!-- Beak -->
      <path d="M45 -108 Q 90 -108, 85 -95 Q 65 -100, 45 -102 Z" fill="#FF8845"/>
      <path d="M75 -98 L 85 -95 L 80 -93 Z" fill="#2A2A2A"/>
      <!-- Eye -->
      <circle cx="35" cy="-115" r="4" fill="white"/>
      <circle cx="36" cy="-115" r="2" fill="black"/>
      <!-- Body -->
      <ellipse cx="-20" cy="20" rx="55" ry="45" fill="#FF7A9A"/>
      <circle cx="-25" cy="15" r="15" fill="#FFA0B8" opacity="0.6"/>
      <!-- Wing -->
      <ellipse cx="-15" cy="20" rx="30" ry="20" fill="#E8658A"/>
  </g>

  <!-- App Title -->
  <g transform="translate(621, 1600)" filter="url(#textShadow)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#FF7A9A" stroke="white" stroke-width="4">WOBBLY</text>
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#FF7A9A" stroke="white" stroke-width="4">FLAMINGO</text>
  </g>

  <!-- Loading Hint -->
  <text x="621" y="2200" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#555" opacity="0.6">LOADING...</text>

</svg>
