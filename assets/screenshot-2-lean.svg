<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky (Stormy) -->
  <defs>
    <linearGradient id="skyStorm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4682B4"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#skyStorm)"/>

  <!-- Clouds -->
  <g fill="#DDDDDD" opacity="0.6">
    <path d="M200 150 Q 260 150, 250 120 Q 220 90, 180 100 Q 140 80, 110 110 Q 100 150, 150 150 Z" />
  </g>

  <!-- Hills (Darker) -->
  <path d="M-100 468 Q 213 374, 533 468 T 1380 468 V 720 H -100 Z" fill="#6B8E23"/>
  <path d="M-100 520 Q 256 462, 612 520 T 1380 520 V 720 H -100 Z" fill="#3E5225"/>

  <!-- Ground -->
  <rect x="0" y="580" width="1280" height="140" fill="#3E2723"/>

  <!-- CHARACTER: ROTATED 35 DEGREES -->
  <g transform="translate(640, 468) rotate(35)">
      <g transform="rotate(-25)">
          <rect x="-8" y="0" width="16" height="50" rx="8" fill="#D05A5A"/>
          <g transform="translate(0, 50) rotate(10)">
              <circle cx="0" cy="0" r="9" fill="#D05A5A"/>
              <rect x="-6" y="0" width="12" height="50" rx="6" fill="#D05A5A"/>
              <path d="M-6 50 L20 50 L10 60 L-6 50 Z" fill="#D05A5A"/>
          </g>
      </g>
      <g transform="translate(0, -10)">
          <path d="M10 -40 C 40 -90, 20 -130, 50 -170" stroke="#FF7A9A" stroke-width="20" fill="none" stroke-linecap="round" transform="rotate(-20)"/>
          <circle cx="50" cy="-170" r="40" fill="#FF7A9A" transform="rotate(-20)"/>
          <circle cx="57" cy="-174" r="15" fill="white" transform="rotate(-20)"/> <!-- Panic eye -->
          <ellipse cx="-20" cy="-40" rx="72" ry="65" fill="#FF7A9A"/>
          <ellipse cx="-10" cy="-50" rx="40" ry="30" fill="#E8658A" transform="rotate(-30)"/> <!-- Flapping wing -->
      </g>
  </g>

  <!-- UI: Wind Warning (Synced) -->
  <text x="40" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF4500" stroke="#333" stroke-width="0.5">WIND GUST! ➜</text>
  <rect x="40" y="80" width="150" height="6" fill="#FF4500" rx="3" />

</svg>
